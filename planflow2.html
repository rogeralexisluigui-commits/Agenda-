<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PlanFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e2ddd4;
  --ink: #1a1714;
  --ink2: #5a5550;
  --ink3: #9a9590;
  --accent: #c84b2f;
  --accent-light: #fde8e3;
  --green: #2a7d4f;
  --green-light: #e0f2ea;
  --blue: #2563c8;
  --blue-light: #dbeafe;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(26,23,20,0.08);
  --shadow-lg: 0 8px 32px rgba(26,23,20,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── Nav tabs ── */
.nav {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 8px;
  border: none; background: none; cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.6rem; font-weight: 600;
  color: var(--ink3);
  letter-upper: 0.3px;
  text-transform: uppercase;
  transition: color 0.2s;
  gap: 3px;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .icon { font-size: 1.3rem; line-height: 1; }

/* ── Header ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 16px 18px 10px;
  border-bottom: 1px solid var(--border);
}
.topbar-row { display: flex; align-items: center; justify-content: space-between; }
.page-title {
  font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px;
}
.page-subtitle { font-size: 0.8rem; color: var(--ink3); margin-top: 1px; }

/* ── Screens ── */
.screen { display: none; padding: 0 0 80px; }
.screen.active { display: block; }

/* ── Daily Banner ── */
.daily-banner {
  margin: 14px 18px;
  background: var(--ink);
  border-radius: var(--radius);
  padding: 18px;
  color: white;
  position: relative;
  overflow: hidden;
}
.daily-banner::before {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(200,75,47,0.3);
}
.daily-banner::after {
  content: '';
  position: absolute;
  right: 30px; bottom: -30px;
  width: 70px; height: 70px;
  border-radius: 50%;
  background: rgba(200,75,47,0.15);
}
.banner-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 4px; }
.banner-date { font-size: 1.1rem; font-weight: 700; }
.banner-stats { display: flex; gap: 14px; margin-top: 12px; }
.banner-stat { font-size: 0.78rem; opacity: 0.8; }
.banner-stat strong { color: #f9b98a; font-size: 1rem; }

/* ── Section ── */
.section { padding: 0 18px; margin-bottom: 20px; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
  padding-top: 14px;
}
.section-label {
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--ink3);
}
.link-btn {
  font-size: 0.75rem; font-weight: 600; color: var(--accent);
  background: none; border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif;
}

/* ── Task cards (today) ── */
.task-row {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s;
  border-left: 3px solid transparent;
}
.task-row:active { transform: scale(0.98); }
.task-row.p-alta { border-left-color: var(--accent); }
.task-row.p-media { border-left-color: var(--amber); }
.task-row.p-baja { border-left-color: var(--green); }
.task-row.done-row { opacity: 0.45; }

.task-row-info { flex: 1; min-width: 0; }
.task-row-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-row-meta { font-size: 0.72rem; color: var(--ink3); margin-top: 2px; display: flex; gap: 8px; }

.mini-prog { width: 44px; }
.mini-prog-bar { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.mini-prog-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.3s; }
.mini-prog-pct { font-size: 0.6rem; color: var(--ink3); text-align: right; margin-top: 2px; font-weight: 600; }

/* ── Schedule strip ── */
.schedule-strip { display: flex; flex-direction: column; gap: 6px; }
.sched-block {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}
.sched-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; font-weight: 600;
  color: var(--ink3);
  min-width: 72px;
}
.sched-name { font-size: 0.85rem; font-weight: 500; flex: 1; }
.sched-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }

/* ── Calendar screen ── */
.cal-wrap { padding: 14px 18px; }

.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-month-label { font-size: 1rem; font-weight: 700; }
.cal-arrow { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; color: var(--ink2); }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-dn { text-align: center; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--ink3); padding: 4px 0 8px; }
.cal-d {
  aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 10px;
  font-size: 0.82rem; font-weight: 500;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
  color: var(--ink2);
}
.cal-d:active { background: var(--surface2); }
.cal-d.today { font-weight: 800; color: var(--accent); }
.cal-d.selected { background: var(--ink); color: white; }
.cal-d.selected.today { background: var(--accent); }
.cal-d.has-t::after {
  content: '';
  position: absolute; bottom: 3px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
}
.cal-d.selected::after { background: rgba(255,255,255,0.7); }
.cal-d.other { color: var(--ink3); opacity: 0.4; }

.cal-day-tasks { margin-top: 16px; }
.cal-day-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink3); margin-bottom: 8px; }

/* ── AI Chat screen ── */
.task-picker-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 18px;
  display: flex; gap: 8px; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.task-picker-bar::-webkit-scrollbar { display: none; }
.task-chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem; font-weight: 600;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Outfit', sans-serif;
  color: var(--ink2);
}
.task-chip.active { background: var(--ink); color: white; border-color: var(--ink); }

.chat-area {
  height: calc(100vh - 260px);
  overflow-y: auto;
  padding: 14px 18px;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.chat-bubble {
  max-width: 85%;
  padding: 10px 13px;
  border-radius: 16px;
  font-size: 0.85rem;
  line-height: 1.5;
  animation: bubbleIn 0.2s ease;
}
@keyframes bubbleIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.bubble-user {
  align-self: flex-end;
  background: var(--ink);
  color: white;
  border-bottom-right-radius: 4px;
}
.bubble-ai {
  align-self: flex-start;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
}
.bubble-ai ul { padding-left: 16px; margin-top: 4px; }
.bubble-ai li { margin-bottom: 3px; }
.bubble-typing {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 14px;
  border-radius: 16px;
  border-bottom-left-radius: 4px;
}
.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--ink3);
  animation: dot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{transform:scale(0.8);opacity:0.5} 40%{transform:scale(1);opacity:1} }

.chat-input-bar {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 9px 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  resize: none;
  max-height: 90px;
  line-height: 1.4;
}
.chat-input:focus { border-color: var(--accent); }
.send-btn {
  width: 38px; height: 38px;
  background: var(--accent);
  border: none; border-radius: 10px;
  color: white; font-size: 1rem;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.send-btn:active { transform: scale(0.92); }

/* ── Schedule screen ── */
.sched-screen { padding: 0 18px 80px; }
.add-sched-form {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.form-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink3); margin-bottom: 5px; display: block; }
.form-inp {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 11px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.form-inp:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.days-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.day-toggle {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 0.72rem; font-weight: 700;
  border: 1.5px solid var(--border);
  background: none; cursor: pointer;
  font-family: 'Outfit', sans-serif;
  color: var(--ink3);
  transition: all 0.15s;
}
.day-toggle.on { background: var(--ink); color: white; border-color: var(--ink); }

.sched-list { display: flex; flex-direction: column; gap: 8px; }
.sched-item {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow);
}
.sched-item-info { flex: 1; }
.sched-item-name { font-weight: 600; font-size: 0.88rem; }
.sched-item-time { font-size: 0.72rem; color: var(--ink3); margin-top: 1px; font-family: 'JetBrains Mono', monospace; }
.sched-item-days { font-size: 0.68rem; color: var(--blue); font-weight: 600; margin-top: 2px; }
.del-sched { background: none; border: none; color: var(--ink3); cursor: pointer; font-size: 1.1rem; padding: 4px; }

/* ── Add Task FAB area ── */
.fab-area {
  position: fixed; bottom: 68px; right: 18px;
  z-index: 90;
}
.fab {
  width: 50px; height: 50px;
  background: var(--accent);
  border-radius: 50%;
  border: none; cursor: pointer;
  font-size: 1.5rem; color: white;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(200,75,47,0.4);
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.6);
  backdrop-filter: blur(3px);
  z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  animation: overlayIn 0.2s;
}
@keyframes overlayIn { from{opacity:0} to{opacity:1} }
.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 32px;
  width: 100%; max-width: 480px;
  animation: sheetUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  max-height: 92vh; overflow-y: auto;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 18px; }
.sheet-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.3px; }
.sheet-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn-main {
  flex: 1; padding: 12px;
  background: var(--accent); color: white;
  border: none; border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: transform 0.15s;
}
.btn-main:active { transform: scale(0.97); }
.btn-sec {
  padding: 12px 16px;
  background: var(--surface2); color: var(--ink2);
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  cursor: pointer;
}

/* ── Task detail sheet ── */
.detail-steps { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.detail-step {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.step-chk {
  width: 18px; height: 18px;
  border: 2px solid var(--border); border-radius: 5px;
  flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; transition: all 0.2s;
}
.detail-step.done .step-chk { background: var(--green); border-color: var(--green); color: white; }
.detail-step.done .step-txt { text-decoration: line-through; opacity: 0.45; }
.step-txt { font-size: 0.83rem; line-height: 1.4; }

.prog-big { margin: 10px 0; }
.prog-big-bar { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.prog-big-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), #e8855f); transition: width 0.4s; }
.prog-pct { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-top: 4px; }

/* ── Toast ── */
.toast-wrap {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
  z-index: 300; width: calc(100% - 36px); max-width: 440px;
  pointer-events: none;
}
.toast {
  background: var(--ink);
  color: white;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 0.83rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.toast.success .t-icon { color: #6ee7b7; }
.toast.warn .t-icon { color: #fbbf24; }

/* misc */
.empty { text-align: center; padding: 30px 20px; color: var(--ink3); font-size: 0.85rem; }
.empty .ei { font-size: 2rem; margin-bottom: 8px; }
.badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 20px; font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.badge-alta { background: var(--accent-light); color: var(--accent); }
.badge-media { background: var(--amber-light); color: var(--amber); }
.badge-baja { background: var(--green-light); color: var(--green); }

.notif-bar {
  margin: 10px 18px 0;
  background: var(--amber-light);
  border: 1px solid #fde68a;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 0.8rem;
  color: var(--amber);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.notif-bar button {
  background: var(--amber); color: white;
  border: none; border-radius: 6px;
  padding: 4px 10px; font-size: 0.72rem; font-weight: 700;
  font-family: 'Outfit', sans-serif; cursor: pointer; white-space: nowrap;
}
</style>
</head>
<body>

<!-- Screens -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="page-title" id="homeTitle">Hoy</div>
        <div class="page-subtitle" id="homeSubtitle"></div>
      </div>
    </div>
  </div>
  <div id="notifBar" class="notif-bar" style="display:none">
    <span>🔔 Activa alertas diarias</span>
    <button onclick="requestNotif()">Activar</button>
  </div>
  <div class="daily-banner" id="dailyBanner">
    <div class="banner-label">Resumen del día</div>
    <div class="banner-date" id="bannerDate"></div>
    <div class="banner-stats" id="bannerStats"></div>
  </div>
  <div class="section">
    <div class="section-head">
      <div class="section-label">Tareas de hoy</div>
      <button class="link-btn" onclick="showScreen('cal')">Ver calendario</button>
    </div>
    <div id="todayTasks"></div>
  </div>
  <div class="section">
    <div class="section-head">
      <div class="section-label">Horario de hoy</div>
      <button class="link-btn" onclick="showScreen('sched')">Editar</button>
    </div>
    <div class="schedule-strip" id="todaySchedule"></div>
  </div>
</div>

<div id="screen-cal" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div class="page-title">Calendario</div>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="cal-header">
      <div class="cal-arrow" onclick="changeMonth(-1)">‹</div>
      <div class="cal-month-label" id="calLabel"></div>
      <div class="cal-arrow" onclick="changeMonth(1)">›</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-day-tasks">
      <div class="cal-day-label" id="calDayLabel"></div>
      <div id="calDayTasks"></div>
    </div>
  </div>
</div>

<div id="screen-ai" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="page-title">Asistente IA</div>
        <div class="page-subtitle">Habla sobre tu tarea</div>
      </div>
    </div>
  </div>
  <div class="task-picker-bar" id="taskPicker"></div>
  <div class="chat-area" id="chatArea"></div>
  <div class="chat-input-bar">
    <textarea class="chat-input" id="chatInput" placeholder="Escribe tu idea o pregunta…" rows="1" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendChat()">↑</button>
  </div>
</div>

<div id="screen-sched" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div class="page-title">Mi Rutina</div>
    </div>
  </div>
  <div class="sched-screen">
    <div style="padding-top:14px;margin-bottom:14px">
      <div class="section-label" style="margin-bottom:10px">Agregar clase / actividad fija</div>
      <div class="add-sched-form">
        <label class="form-label">Nombre</label>
        <input id="sName" class="form-inp" type="text" placeholder="ej. Química de Alimentos">
        <div class="form-row">
          <div>
            <label class="form-label">Inicio</label>
            <input id="sStart" class="form-inp" type="time">
          </div>
          <div>
            <label class="form-label">Fin</label>
            <input id="sEnd" class="form-inp" type="time">
          </div>
        </div>

<script>
// ────────────────────────────────────────────────────────────────
// STORAGE — IndexedDB with localStorage fallback
// ────────────────────────────────────────────────────────────────
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    if (!window.indexedDB) { res(null); return; }
    const req = indexedDB.open('planflow', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('tasks')) d.createObjectStore('tasks', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('schedule')) d.createObjectStore('schedule', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('chats')) d.createObjectStore('chats', { keyPath: 'taskId' });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => { db = null; res(null); };
  });
}

function dbGetAll(store) {
  return new Promise(res => {
    if (!db) { res(JSON.parse(localStorage.getItem('pf_' + store) || '[]')); return; }
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror = () => res(JSON.parse(localStorage.getItem('pf_' + store) || '[]'));
  });
}

function dbPut(store, item) {
  return new Promise(res => {
    if (!db) {
      const arr = JSON.parse(localStorage.getItem('pf_' + store) || '[]');
      const idx = arr.findIndex(x => x.id === item.id);
      if (idx >= 0) arr[idx] = item; else arr.push(item);
      localStorage.setItem('pf_' + store, JSON.stringify(arr));
      res(); return;
    }
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(item);
    tx.oncomplete = () => res();
    tx.onerror = () => {
      // fallback
      const arr = JSON.parse(localStorage.getItem('pf_' + store) || '[]');
      const idx = arr.findIndex(x => x.id === item.id);
      if (idx >= 0) arr[idx] = item; else arr.push(item);
      localStorage.setItem('pf_' + store, JSON.stringify(arr));
      res();
    };
  });
}

function dbDelete(store, id) {
  return new Promise(res => {
    if (!db) {
      const arr = JSON.parse(localStorage.getItem('pf_' + store) || '[]').filter(x => x.id !== id);
      localStorage.setItem('pf_' + store, JSON.stringify(arr));
      res(); return;
    }
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = () => res();
  });
}

// ────────────────────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────────────────────
let tasks = [];
let schedules = [];
let chatHistories = {}; // taskId -> [{role,content}]
let activeChatTask = null;
let calYear, calMonth, calSelected;
const todayDate = new Date(); todayDate.setHours(0,0,0,0);
calYear = todayDate.getFullYear();
calMonth = todayDate.getMonth();
calSelected = todayDate.toISOString().slice(0,10);

const DAYS_ES = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ────────────────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────────────────
async function init() {
  await openDB();
  tasks = await dbGetAll('tasks');
  schedules = await dbGetAll('schedule');
  // load chat histories
  const chatRecords = await dbGetAll('chats');
  chatRecords.forEach(r => { chatHistories[r.taskId] = r.history; });

  renderHome();
  renderCal();
  renderScheduleList();
  renderTaskPicker();
  setupDayToggles();

  // Notification check
  if (Notification && Notification.permission !== 'granted') {
    document.getElementById('notifBar').style.display = 'flex';
  }
  checkDailyNotif();
}

// ────────────────────────────────────────────────────────────────
// NAVIGATION
// ────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector(`[data-s="${name}"]`)?.classList.add('active');
  document.getElementById('fab').style.display = (name === 'home' || name === 'cal') ? 'block' : 'none';
  if (name === 'ai') renderAIScreen();
  if (name === 'home') renderHome();
  if (name === 'cal') renderCal();
}

// ────────────────────────────────────────────────────────────────
// HOME
// ────────────────────────────────────────────────────────────────
function renderHome() {
  const todayStr = todayDate.toISOString().slice(0,10);
  const todayTasks = tasks.filter(t => t.date === todayStr);
  const pending = todayTasks.filter(t => !t.done);
  const done = todayTasks.filter(t => t.done);

  document.getElementById('homeTitle').textContent = 'Hoy';
  document.getElementById('homeSubtitle').textContent =
    todayDate.toLocaleDateString('es-GT', { weekday:'long', day:'numeric', month:'long' });

  document.getElementById('bannerDate').textContent =
    todayDate.toLocaleDateString('es-GT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('bannerStats').innerHTML = `
    <div class="banner-stat"><strong>${pending.length}</strong><br>pendientes</div>
    <div class="banner-stat"><strong>${done.length}</strong><br>completadas</div>
    <div class="banner-stat"><strong>${getTodayClasses().length}</strong><br>clases hoy</div>
  `;

  // today tasks
  const el = document.getElementById('todayTasks');
  if (todayTasks.length === 0) {
    el.innerHTML = '<div class="empty"><div class="ei">📭</div>Sin tareas para hoy</div>';
  } else {
    el.innerHTML = todayTasks.map(t => taskRowHtml(t)).join('');
  }

  // today schedule
  const classes = getTodayClasses().sort((a,b) => a.start.localeCompare(b.start));
  const se = document.getElementById('todaySchedule');
  if (classes.length === 0) {
    se.innerHTML = '<div style="font-size:0.8rem;color:var(--ink3);padding:6px 0">Sin clases registradas para hoy. <button class="link-btn" onclick="showScreen(\'sched\')">Agregar</button></div>';
  } else {
    se.innerHTML = classes.map(c => `
      <div class="sched-block">
        <div class="sched-dot"></div>
        <div class="sched-name">${c.name}</div>
        <div class="sched-time">${c.start} – ${c.end}</div>
      </div>
    `).join('');
  }
}

function getTodayClasses() {
  const day = todayDate.getDay();
  return schedules.filter(s => s.days && s.days.includes(day));
}

function taskRowHtml(t) {
  const prog = calcProg(t);
  return `
    <div class="task-row p-${t.priority} ${t.done?'done-row':''}" onclick="openDetail('${t.id}')">
      <div class="task-row-info">
        <div class="task-row-title">${t.title}</div>
        <div class="task-row-meta">
          <span>${daysUntil(t.date)}</span>
          <span class="badge badge-${t.priority}">${t.priority}</span>
        </div>
      </div>
      <div class="mini-prog">
        <div class="mini-prog-bar"><div class="mini-prog-fill" style="width:${prog}%"></div></div>
        <div class="mini-prog-pct">${prog}%</div>
      </div>
    </div>`;
}

// ────────────────────────────────────────────────────────────────
// CALENDAR
// ────────────────────────────────────────────────────────────────
function renderCal() {
  document.getElementById('calLabel').textContent = `${MONTHS_ES[calMonth]} ${calYear}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  DAYS_ES.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dn'; el.textContent = d;
    grid.appendChild(el);
  });

  const taskDates = new Set(tasks.map(t => t.date));
  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth + 1, 0);
  const startDay = first.getDay();
  const prevLast = new Date(calYear, calMonth, 0).getDate();

  for (let i = startDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-d other'; el.textContent = prevLast - i;
    grid.appendChild(el);
  }

  for (let d = 1; d <= last.getDate(); d++) {
    const el = document.createElement('div');
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    el.className = 'cal-d';
    el.textContent = d;
    const td = new Date(calYear, calMonth, d);
    if (td.getTime() === todayDate.getTime()) el.classList.add('today');
    if (ds === calSelected) el.classList.add('selected');
    if (taskDates.has(ds)) el.classList.add('has-t');
    el.addEventListener('click', () => { calSelected = ds; renderCal(); renderCalDay(); });
    grid.appendChild(el);
  }

  renderCalDay();
}

function renderCalDay() {
  const d = new Date(calSelected + 'T00:00:00');
  document.getElementById('calDayLabel').textContent =
    d.toLocaleDateString('es-GT', { weekday:'long', day:'numeric', month:'long' });
  const dayTasks = tasks.filter(t => t.date === calSelected);
  const el = document.getElementById('calDayTasks');
  if (dayTasks.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:16px"><div class="ei">📭</div>Sin tareas</div>';
  } else {
    el.innerHTML = dayTasks.map(t => taskRowHtml(t)).join('');
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}

// ────────────────────────────────────────────────────────────────
// TASK DETAIL
// ────────────────────────────────────────────────────────────────
function openDetail(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const prog = calcProg(t);
  const stepsHtml = t.steps ? t.steps.map((s,i) => `
    <div class="detail-step ${s.done?'done':''}" onclick="toggleStep('${id}',${i})">
      <div class="step-chk">${s.done?'✓':''}</div>
      <div class="step-txt">${s.text}</div>
    </div>
  `).join('') : '';

  document.getElementById('detailSheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">
      <div class="sheet-title" style="margin:0">${t.title}</div>
      <span class="badge badge-${t.priority}">${t.priority}</span>
    </div>
    ${t.desc ? `<div style="font-size:0.82rem;color:var(--ink2);line-height:1.5;margin-bottom:10px">${t.desc}</div>` : ''}
    <div style="font-size:0.78rem;color:var(--ink3);margin-bottom:10px">📅 ${formatDate(t.date)} · ${daysUntil(t.date)}</div>
    <div class="prog-big">
      <div class="prog-big-bar"><div class="prog-big-fill" style="width:${prog}%"></div></div>
      <div class="prog-pct">${prog}% completado</div>
    </div>
    ${t.steps && t.steps.length > 0 ? `
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink3);margin-bottom:6px">Plan de acción</div>
      <div class="detail-steps">${stepsHtml}</div>
    ` : t.loadingSteps ? `<div style="font-size:0.82rem;color:var(--ink3);padding:12px 0">⏳ Generando plan…</div>` : ''}
    <div class="sheet-actions" style="margin-top:14px">
      ${!t.done ? `<button class="btn-main" onclick="completeTask('${id}')">✓ Completar</button>` : `<div style="color:var(--green);font-weight:700;font-size:0.88rem">✓ Tarea completada</div>`}
      <button class="btn-sec" onclick="openAIForTask('${id}')">✦ Hablar con IA</button>
      <button class="btn-sec" style="color:var(--accent);border-color:var(--accent)" onclick="deleteTask('${id}')">🗑</button>
    </div>
  `;
  document.getElementById('detailOverlay').style.display = 'flex';
}

function openAIForTask(id) {
  closeSheet('detailOverlay');
  activeChatTask = id;
  showScreen('ai');
}

// ────────────────────────────────────────────────────────────────
// TASK ACTIONS
// ────────────────────────────────────────────────────────────────
async function toggleStep(taskId, idx) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.steps) return;
  t.steps[idx].done = !t.steps[idx].done;
  await dbPut('tasks', t);
  renderHome(); renderCalDay(); openDetail(taskId);
  if (calcProg(t) === 100) showToast('¡Todos los pasos completos! 🎉', 'success');
}

async function completeTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = true;
  if (t.steps) t.steps.forEach(s => s.done = true);
  await dbPut('tasks', t);
  closeSheet('detailOverlay');
  renderHome(); renderCal(); renderTaskPicker();
  showToast(`"${t.title}" completada ✓`, 'success');
}

async function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  await dbDelete('tasks', id);
  closeSheet('detailOverlay');
  renderHome(); renderCal(); renderTaskPicker();
  showToast('Tarea eliminada', 'warn');
}

// ────────────────────────────────────────────────────────────────
// NEW TASK
// ────────────────────────────────────────────────────────────────
function openNewTask() {
  const active = document.querySelector('.screen.active').id;
  const ds = active === 'screen-cal' ? calSelected : todayDate.toISOString().slice(0,10);
  document.getElementById('ntDate').value = ds;
  document.getElementById('ntTitle').value = '';
  document.getElementById('ntDesc').value = '';
  document.getElementById('newTaskOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('ntTitle').focus(), 100);
}

async function createTask() {
  const title = document.getElementById('ntTitle').value.trim();
  const desc = document.getElementById('ntDesc').value.trim();
  const date = document.getElementById('ntDate').value;
  const priority = document.getElementById('ntPriority').value;
  if (!title || !date) { showToast('Completa el título y la fecha', 'warn'); return; }

  const id = 'task_' + Date.now();
  const task = { id, title, desc, date, priority, done: false, steps: null, loadingSteps: true };
  tasks.push(task);
  await dbPut('tasks', task);
  closeSheet('newTaskOverlay');
  renderHome(); renderCal(); renderTaskPicker();
  showToast('Tarea creada. Generando plan…', 'success');

  await generatePlan(id);
}

async function generatePlan(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const todayStr = todayDate.toISOString().slice(0,10);
  const dueDate = t.date;
  const daysLeft = Math.ceil((new Date(dueDate+'T00:00:00') - todayDate)/(1000*60*60*24));

  // Get today's schedule for context
  const todayClasses = getTodayClasses();
  const schedCtx = todayClasses.length > 0
    ? `Hoy tiene clases de: ${todayClasses.map(c=>`${c.name} (${c.start}-${c.end})`).join(', ')}.`
    : 'No hay clases registradas para hoy.';

  const prompt = `Eres un asistente de planificación para un estudiante de agroindustria. Genera un plan de acción para esta tarea:

Título: "${t.title}"
Descripción: "${t.desc || 'No especificada'}"
Fecha límite: ${dueDate} (faltan ${daysLeft} días)
Prioridad: ${t.priority}
Contexto de horario: ${schedCtx}

Genera entre 5 y 7 pasos concretos, breves (máximo 12 palabras cada uno), en español, ordenados lógicamente. Responde ÚNICAMENTE con un JSON array de strings. Sin texto adicional. Sin markdown.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw = (data.content || []).map(b => b.text||'').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    const steps = JSON.parse(clean);
    t.steps = steps.map(s => ({ text: s, done: false }));
  } catch {
    t.steps = [
      { text: 'Revisar el objetivo y los requisitos', done: false },
      { text: 'Reunir materiales e información necesaria', done: false },
      { text: 'Desarrollar el contenido principal', done: false },
      { text: 'Revisar y corregir el trabajo', done: false },
      { text: 'Entregar o finalizar la tarea', done: false }
    ];
  }
  t.loadingSteps = false;
  await dbPut('tasks', t);
  renderHome(); renderCal(); renderTaskPicker();
  showToast('Plan listo ✦', 'success');
}

// ────────────────────────────────────────────────────────────────
// AI CHAT
// ────────────────────────────────────────────────────────────────
function renderAIScreen() {
  renderTaskPicker();
  if (!activeChatTask && tasks.length > 0) activeChatTask = tasks[0].id;
  renderChat();
}

function renderTaskPicker() {
  const bar = document.getElementById('taskPicker');
  const pending = tasks.filter(t => !t.done);
  if (pending.length === 0) {
    bar.innerHTML = '<div style="font-size:0.78rem;color:var(--ink3);padding:4px">Sin tareas activas</div>';
    return;
  }
  bar.innerHTML = pending.map(t => `
    <button class="task-chip ${activeChatTask===t.id?'active':''}" onclick="selectChatTask('${t.id}')">${t.title}</button>
  `).join('');
}

function selectChatTask(id) {
  activeChatTask = id;
  renderTaskPicker();
  renderChat();
}

function renderChat() {
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  if (!activeChatTask) {
    area.innerHTML = '<div class="empty"><div class="ei">🤖</div>Selecciona una tarea para empezar</div>';
    return;
  }
  const t = tasks.find(x => x.id === activeChatTask);
  const history = chatHistories[activeChatTask] || [];

  if (history.length === 0) {
    // Welcome message
    const steps = t?.steps ? t.steps.map((s,i) => `${i+1}. ${s.text}`).join('\n') : 'Aún sin pasos generados.';
    addBubble('ai', `Hola 👋 Hablemos de **"${t?.title}"**.\n\nPlan actual:\n${steps}\n\n¿Cómo piensas abordarla? Cuéntame y te ayudo a estructurar o mejorar tu enfoque.`);
    return;
  }
  history.forEach(m => addBubble(m.role === 'user' ? 'user' : 'ai', m.content, false));
  area.scrollTop = area.scrollHeight;
}

function addBubble(type, text, scroll = true) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `chat-bubble bubble-${type}`;
  div.innerHTML = formatMsg(text);
  area.appendChild(div);
  if (scroll) area.scrollTop = area.scrollHeight;
  return div;
}

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && document.activeElement.id === 'chatInput') {
    e.preventDefault(); sendChat();
  }
});

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !activeChatTask) return;
  input.value = ''; input.style.height = 'auto';

  const t = tasks.find(x => x.id === activeChatTask);
  if (!chatHistories[activeChatTask]) chatHistories[activeChatTask] = [];
  chatHistories[activeChatTask].push({ role: 'user', content: msg });

  addBubble('user', msg);

  // Typing indicator
  const area = document.getElementById('chatArea');
  const typing = document.createElement('div');
  typing.className = 'bubble-typing';
  typing.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  area.appendChild(typing);
  area.scrollTop = area.scrollHeight;

  // Build context
  const steps = t?.steps ? t.steps.map((s,i) => `${i+1}. [${s.done?'✓':'○'}] ${s.text}`).join('\n') : 'Sin plan generado.';
  const todayClasses = getTodayClasses();
  const schedCtx = todayClasses.length > 0
    ? `Hoy tiene: ${todayClasses.map(c=>`${c.name} ${c.start}-${c.end}`).join(', ')}`
    : 'Sin clases hoy.';
  const daysLeft = Math.ceil((new Date(t.date+'T00:00:00') - todayDate)/(86400000));

  const systemPrompt = `Eres un asistente de planificación académica para Luigi, estudiante de agroindustria en ENCA Guatemala. Estás ayudándolo con la tarea "${t?.title}". 

Plan actual de la tarea:
${steps}

Contexto: Faltan ${daysLeft} días para la entrega. Prioridad: ${t?.priority}. ${schedCtx}

Tu rol: ayudar a estructurar ideas, sugerir enfoques más eficientes, organizar el plan si el alumno lo describe, y responder preguntas sobre cómo avanzar. Sé conciso, práctico y directo. Responde en español. Máximo 150 palabras por respuesta.`;

  const messages = chatHistories[activeChatTask].map(m => ({ role: m.role, content: m.content }));

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages
      })
    });
    const data = await res.json();
    const reply = (data.content || []).map(b => b.text||'').join('').trim();
    typing.remove();
    chatHistories[activeChatTask].push({ role: 'assistant', content: reply });
    await dbPut('chats', { taskId: activeChatTask, history: chatHistories[activeChatTask] });
    addBubble('ai', reply);
  } catch {
    typing.remove();
    addBubble('ai', 'No pude conectarme en este momento. Intenta de nuevo.');
  }
}

// ────────────────────────────────────────────────────────────────
// SCHEDULE
// ────────────────────────────────────────────────────────────────
let selectedDays = [];

function setupDayToggles() {
  document.querySelectorAll('.day-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = parseInt(btn.dataset.d);
      if (selectedDays.includes(d)) {
        selectedDays = selectedDays.filter(x => x !== d);
        btn.classList.remove('on');
      } else {
        selectedDays.push(d);
        btn.classList.add('on');
      }
    });
  });
}

async function addSchedule() {
  const name = document.getElementById('sName').value.trim();
  const start = document.getElementById('sStart').value;
  const end = document.getElementById('sEnd').value;
  if (!name || !start || !end || selectedDays.length === 0) {
    showToast('Completa todos los campos y selecciona días', 'warn'); return;
  }
  const item = { id: 'sched_' + Date.now(), name, start, end, days: [...selectedDays] };
  schedules.push(item);
  await dbPut('schedule', item);
  document.getElementById('sName').value = '';
  document.getElementById('sStart').value = '';
  document.getElementById('sEnd').value = '';
  selectedDays = [];
  document.querySelectorAll('.day-toggle').forEach(b => b.classList.remove('on'));
  renderScheduleList(); renderHome();
  showToast('Actividad agregada ✓', 'success');
}

function renderScheduleList() {
  const el = document.getElementById('schedList');
  if (schedules.length === 0) {
    el.innerHTML = '<div class="empty"><div class="ei">📚</div>Sin clases registradas</div>';
    return;
  }
  const sorted = [...schedules].sort((a,b) => a.start.localeCompare(b.start));
  el.innerHTML = sorted.map(s => `
    <div class="sched-item">
      <div class="sched-item-info">
        <div class="sched-item-name">${s.name}</div>
        <div class="sched-item-time">${s.start} – ${s.end}</div>
        <div class="sched-item-days">${s.days.map(d=>DAYS_ES[d]).join(' · ')}</div>
      </div>
      <button class="del-sched" onclick="deleteSchedule('${s.id}')">✕</button>
    </div>
  `).join('');
}

async function deleteSchedule(id) {
  schedules = schedules.filter(x => x.id !== id);
  await dbDelete('schedule', id);
  renderScheduleList(); renderHome();
  showToast('Eliminado', 'warn');
}

// ────────────────────────────────────────────────────────────────
// NOTIFICATIONS
// ────────────────────────────────────────────────────────────────
async function requestNotif() {
  if (!('Notification' in window)) { showToast('Tu navegador no soporta notificaciones', 'warn'); return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    document.getElementById('notifBar').style.display = 'none';
    showToast('Notificaciones activadas 🔔', 'success');
    new Notification('PlanFlow activo 🟢', { body: 'Recibirás recordatorios diarios.' });
    scheduleDailyNotif();
  } else {
    showToast('Permiso denegado', 'warn');
  }
}

function checkDailyNotif() {
  if (Notification.permission !== 'granted') return;
  const todayStr = todayDate.toISOString().slice(0,10);
  const lastNotif = localStorage.getItem('pf_last_notif');
  if (lastNotif === todayStr) return;
  localStorage.setItem('pf_last_notif', todayStr);

  const todayTasks = tasks.filter(t => t.date === todayStr && !t.done);
  const newTasks = tasks.filter(t => {
    const created = parseInt(t.id.replace('task_',''));
    return Date.now() - created < 86400000 && !t.done;
  });

  if (todayTasks.length > 0 || newTasks.length > 0) {
    const lines = [];
    if (todayTasks.length) lines.push(`📋 ${todayTasks.length} tarea(s) vencen hoy`);
    if (newTasks.length) lines.push(`✨ ${newTasks.length} tarea(s) nuevas`);
    new Notification('Buenos días — PlanFlow', { body: lines.join('\n') });
  }

  // check upcoming (1-2 days)
  tasks.filter(t => !t.done).forEach(t => {
    const diff = Math.ceil((new Date(t.date+'T00:00:00') - todayDate)/86400000);
    if (diff === 1) {
      setTimeout(() => new Notification(`⏰ Mañana vence: ${t.title}`, { body: `Progreso: ${calcProg(t)}%` }), 500);
    }
  });
}

function scheduleDailyNotif() {
  // Re-check every hour (when app open)
  setInterval(checkDailyNotif, 3600000);
}

// ────────────────────────────────────────────────────────────────
// UTILS
// ────────────────────────────────────────────────────────────────
function calcProg(t) {
  if (t.done) return 100;
  if (!t.steps || t.steps.length === 0) return 0;
  return Math.round(t.steps.filter(s => s.done).length / t.steps.length * 100);
}

function formatDate(ds) {
  if (!ds) return '';
  return new Date(ds+'T00:00:00').toLocaleDateString('es-GT', { weekday:'short', day:'numeric', month:'short' });
}

function daysUntil(ds) {
  const diff = Math.ceil((new Date(ds+'T00:00:00') - todayDate)/86400000);
  if (diff < 0) return `Venció hace ${Math.abs(diff)}d`;
  if (diff === 0) return 'Vence hoy';
  if (diff === 1) return 'Mañana';
  return `En ${diff} días`;
}

function closeSheet(id, e) {
  if (e && e.target.id !== id) return;
  document.getElementById(id).style.display = 'none';
}

function showToast(msg, type = 'success') {
  const icons = { success: '✓', warn: '⚠' };
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="t-icon">${icons[type]||'•'}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

init();
